<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abhijith B | Admin Panel</title>
  </head>
  <body>
    <!-- Instruct Decap CMS to wait for manual init -->
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // Merge only the dynamic backend properties into the configuration loaded from /config.yml
      CMS.init({
        config: {
          backend: {
            name: "github",
            repo: "abhi-jithb/abhijithb",
            branch: "main",
            base_url: window.location.origin,
            auth_endpoint: "api/auth"
          },
          local_backend: false
        }
      });
    </script>
  </body>
</html>
